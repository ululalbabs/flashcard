<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene mindar-image="imageTargetSrc: targets.mind; autoStart: true;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             vr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ar-video" src="videoa.webm" 
               preload="auto" 
               loop 
               crossorigin="anonymous" 
               playsinline 
               webkit-playsinline>
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
        
        <a-video src="#ar-video" position="0 0 0" width="1" height="0.5625" rotation="0 0 0"></a-video>
        
      </a-entity>
    </a-scene>

    <script>
      const targetEntity = document.querySelector('#target-entity');
      const vid = document.querySelector('#ar-video');

      // 1. Ketika kamera berhasil melacak (mendeteksi) kartu Boboiboy
      targetEntity.addEventListener("targetFound", event => {
        console.log("Kartu terdeteksi, video diputar!");
        vid.play(); 
      });

      // 2. Ketika kartu disingkirkan / hilang dari jangkauan kamera
      targetEntity.addEventListener("targetLost", event => {
        console.log("Kartu hilang, video dijeda!");
        vid.pause(); 
      });
      
      // 3. Trik khusus untuk browser HP (Safari/Chrome Mobile)
      // Browser HP biasanya memblokir suara video jika pengguna belum pernah menyentuh layar.
      window.addEventListener('click', () => {
         vid.play().then(() => { vid.pause(); });
      }, { once: true });
    </script>
  </body>
</html>
